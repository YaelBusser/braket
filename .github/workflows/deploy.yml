name: Deploy to Pterodactyl

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Restart Pterodactyl server
        run: |
          echo "Sending restart signal to Pterodactyl..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.PTERO_PANEL_URL }}/api/client/servers/${{ secrets.PTERO_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Server restart signal sent successfully!"
            echo "The server will now:"
            echo "  1. Stop the current process"
            echo "  2. Run 'git pull' to fetch latest code"
            echo "  3. Run 'npm install'"
            echo "  4. Run 'prisma generate/push/seed'"
            echo "  5. Run 'npm run build'"
            echo "  6. Run 'npm run start'"
            echo ""
            echo "Deployment will complete in ~2-3 minutes."
          else
            echo "Error sending restart signal!"
            echo "Response: $BODY"
            exit 1
          fi
